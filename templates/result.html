<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Results - Resume Screening</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Matching Results</h2>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>

        {% if results %}
        <form action="/send_to_ta" method="POST">
            <div class="row">
                {% for result in results %}
                <div class="col-md-6">
                    <div class="card mb-4 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ result.filename }}</h5>
                            <p class="card-text"><strong>Match Score:</strong> {{ result.score }}%</p>
                            <p class="card-text"><strong>Matched Skills:</strong> {{ result.skills | join(', ') }}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="selected_ids" value="{{ result.id }}" id="resume{{ result.id }}">
                                    <label class="form-check-label" for="resume{{ result.id }}">Select</label>
                                </div>
                                <a href="/download/{{ result.filename }}" class="btn btn-sm btn-outline-primary">
                                    <i class="fa fa-download"></i> Download
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="text-center mb-4">
                <button type="submit" class="btn btn-success">Send to TA</button>
                <a href="/" class="btn btn-secondary ms-2">Back to Home</a>
            </div>
        </form>
        {% else %}
        <div class="alert alert-warning text-center" role="alert">
            No matching results found.
        </div>
        <div class="text-center">
            <a href="/" class="btn btn-primary">← Go Back</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
